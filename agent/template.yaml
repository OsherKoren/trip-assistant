AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Trip Assistant Agent - LangGraph agent with response streaming

Parameters:
  EnvironmentType:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - staging
      - prod
    Description: Environment type for the deployment

Globals:
  Function:
    Timeout: 60
    MemorySize: 1024
    EphemeralStorage:
      Size: 10240
    Environment:
      Variables:
        ENVIRONMENT: !Ref EnvironmentType
        PYTHONUNBUFFERED: '1'

Resources:
  TripAssistantAgentFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: trip-assistant-agent
      CodeUri: .
      PackageType: Image
      Description: LangGraph agent for trip Q&A with response streaming
      Environment:
        Variables:
          OPENAI_API_KEY: !Sub '{{resolve:secretsmanager:trip-assistant-secrets:SecretString:openai_api_key}}'
      Tags:
        Service: trip-assistant
        Component: agent

  TripAssistantSecretsRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: SecretsManagerAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:trip-assistant-secrets-*'

Outputs:
  FunctionArn:
    Description: Lambda function ARN
    Value: !GetAtt TripAssistantAgentFunction.Arn

  FunctionName:
    Description: Lambda function name
    Value: !Ref TripAssistantAgentFunction

  FunctionRoleArn:
    Description: IAM role ARN for the function
    Value: !GetAtt TripAssistantSecretsRole.Arn
